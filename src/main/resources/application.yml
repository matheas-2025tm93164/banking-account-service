server:
  port: 8002

spring:
  application:
    name: banking-account-service
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5434/account_db}
    username: ${DATABASE_USERNAME:account_user}
    password: ${DATABASE_PASSWORD:account_pass}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

customer-service:
  url: ${CUSTOMER_SERVICE_URL:http://localhost:8001}

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health,prometheus
      path-mapping:
        health: health
        prometheus: metrics
  endpoint:
    health:
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true

logging:
  level:
    root: INFO
    com.banking.account: INFO
